<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Premium Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#47A1FF" />
      <stop offset="100%" stop-color="#005EEA" />
    </linearGradient>

    <!-- Dumbbell Gradient (Match the Background for a clean cutout look) -->
    <linearGradient id="dumbbelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#0055D4" />
    </linearGradient>

    <!-- Knob Drop Shadow -->
    <filter id="knobShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000214" flood-opacity="0.35" />
    </filter>

    <!-- Inner Shadow for the Track to give depth -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="12"/>
      <feGaussianBlur stdDeviation="16" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect width="1024" height="1024" rx="226" fill="url(#bgGrad)"/>
  
  <!-- Subtle border to enhance the app icon shape (iOS style) -->
  <rect width="1024" height="1024" rx="226" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4"/>

  <!-- BIGGER TOGGLE TRACK -->
  <rect x="82" y="332" width="860" height="360" rx="180" fill="#000000" fill-opacity="0.2" filter="url(#innerShadow)"/>

  <!-- LAZY SIDE: SOFA -->
  <!-- Centered at X=262, Y=512 -->
  <g transform="translate(262, 512) scale(1.45)" fill="#ffffff" opacity="0.5">
    <!-- Backrest -->
    <rect x="-60" y="-38" width="120" height="40" rx="10"/>
    <!-- Seat -->
    <rect x="-70" y="-8" width="140" height="30" rx="12"/>
    <!-- Left Armrest -->
    <rect x="-84" y="-18" width="24" height="40" rx="10"/>
    <!-- Right Armrest -->
    <rect x="60" y="-18" width="24" height="40" rx="10"/>
    <!-- Legs -->
    <rect x="-60" y="22" width="10" height="16" rx="4"/>
    <rect x="50" y="22" width="10" height="16" rx="4"/>
    
    <!-- Zzz Marks -->
    <path d="M -10 -68 L 6 -68 L -10 -52 L 6 -52" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 20 -98 L 44 -98 L 20 -74 L 44 -74" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ACTIVE KNOB -->
  <!-- Center X = 762, Center Y = 512, Radius = 160 -->
  <circle cx="762" cy="512" r="160" fill="#ffffff" filter="url(#knobShadow)"/>

  <!-- ACTIVE SIDE: DUMBBELL (Inside Knob) -->
  <!-- Centered at X=762, Y=512 -->
  <g transform="translate(762, 512) scale(1.45)" fill="url(#dumbbelGrad)">
    <!-- Handle -->
    <rect x="-34" y="-8" width="68" height="16" rx="6"/>
    <!-- Inner Plates -->
    <rect x="-54" y="-40" width="20" height="80" rx="8"/>
    <rect x="34" y="-40" width="20" height="80" rx="8"/>
    <!-- Outer Plates -->
    <rect x="-70" y="-28" width="16" height="56" rx="6"/>
    <rect x="54" y="-28" width="16" height="56" rx="6"/>
    <!-- Subtle center mark on plates -->
    <rect x="-46" y="-40" width="4" height="80" fill="#000000" fill-opacity="0.15" rx="2"/>
    <rect x="42" y="-40" width="4" height="80" fill="#000000" fill-opacity="0.15" rx="2"/>
  </g>
</svg>
